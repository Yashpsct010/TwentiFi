name: Build and Release APK

on:
  push:
    branches:
      - main  # Triggers automatically when pushing to the main branch
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create the GitHub Release

    steps:
      - name: 🏗 Setup repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔐 Generate google-services.json
        run: node -e "require('fs').writeFileSync('google-services.json', Buffer.from(process.env.GOOGLE_SERVICES_JSON_BASE64, 'base64'))"
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: 🚀 Build APK locally (Free)
        # We use the 'preview' profile from eas.json because it is configured to build an APK instead of AAB
        run: eas build --platform android --profile preview --local --output twentifi.apk

      - name: 🏷️ Update Latest Tag
        # Force update the tag instead of deleting it so the release doesn't turn into a draft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa latest -m "Update latest tag"
          git push origin latest --force

      - name: 📦 Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If the release already exists, we upload and overwrite the APK.
          # If it doesn't exist, we create it and mark it as the latest release.
          if gh release view latest > /dev/null 2>&1; then
            echo "Release 'latest' exists, updating asset..."
            gh release upload latest twentifi.apk --clobber
          else
            echo "Release 'latest' does not exist, creating..."
            gh release create latest twentifi.apk --title "Latest TwentiFi Build" --notes "Automated APK build from GitHub Actions." --latest
          fi
